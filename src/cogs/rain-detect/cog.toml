[cog]
id = "rain-detect"
name = "Rain Detection"
version = "1.0.0"
category = "research"
description = "Broadband amplitude analysis for precipitation classification — start, stop, and intensity"
binary = "cog-rain-detect-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 30
min = 5
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 10", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
