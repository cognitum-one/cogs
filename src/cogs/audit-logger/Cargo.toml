[package]
name = "cog-audit-logger"
version = "1.0.0"
edition = "2021"
description = "Tamper-proof event logging with hash-chain and witness attestation"

[[bin]]
name = "cog-audit-logger"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
