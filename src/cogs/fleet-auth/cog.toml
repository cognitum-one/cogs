[cog]
id = "fleet-auth"
name = "Fleet Authentication"
version = "1.0.0"
category = "security"
description = "Device fleet authentication with Ed25519 keypairs, challenge-response, and device registry"
binary = "cog-fleet-auth-arm"

[config]

[config.interval]
type = "integer"
label = "Auth check interval"
description = "Seconds between authentication verification rounds"
default = 30
min = 5
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 60", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
