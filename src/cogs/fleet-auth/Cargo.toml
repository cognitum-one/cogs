[package]
name = "cog-fleet-auth"
version = "1.0.0"
edition = "2021"
description = "Device fleet authentication — Ed25519 keypair, challenge-response, device registry"

[[bin]]
name = "cog-fleet-auth"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
