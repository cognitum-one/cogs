[package]
name = "cog-shelf-engagement"
version = "1.0.0"
edition = "2021"
description = "Detect brief interactions near zones — short dwell (5-30s) = engagement"

[[bin]]
name = "cog-shelf-engagement"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
