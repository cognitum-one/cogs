[cog]
id = "shelf-engagement"
name = "Shelf Engagement"
version = "1.0.0"
category = "retail"
description = "Detect brief customer interactions near zones — short dwell (5-30s) indicates product engagement"
binary = "cog-shelf-engagement-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
