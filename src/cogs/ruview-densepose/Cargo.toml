[package]
name = "cog-ruview-densepose"
version = "1.0.0"
edition = "2021"
description = "RuView integration — ESP32 CSI to 17-keypoint skeleton proxy via Hampel + phase sanitization"

[[bin]]
name = "cog-ruview-densepose"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
