[package]
name = "cog-ppe-compliance"
version = "1.0.0"
edition = "2021"
description = "PPE compliance — fuses ruview-densepose presence with PPE-camera confirmation to flag unprotected entry into restricted zones"

[[bin]]
name = "cog-ppe-compliance"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
