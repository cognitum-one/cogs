[package]
name = "cog-tailscale"
version = "0.1.0"
edition = "2021"
description = "Cognitum cog: Tailscale mesh VPN in userspace mode"
license = "Apache-2.0"

[[bin]]
name = "cog-tailscale"
path = "src/main.rs"

[dependencies]
# No tokio — keep the cog single-threaded + small. tailscaled does the heavy lifting.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
# Minimal HTTP client (for binary download) — ureq is sync, no openssl.
ureq = { version = "2.10", features = ["tls"], default-features = false }
# Tiny HTTP server for the cog API (no axum/tokio).
tiny_http = "0.12"
sha2 = "0.10"
hex = "0.4"
log = "0.4"
env_logger = "0.11"

[profile.release]
opt-level = "z"      # optimize for size — cog binary stays tiny
lto = "fat"
codegen-units = 1
strip = true
