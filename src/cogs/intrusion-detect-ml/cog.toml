[cog]
id = "intrusion-detect-ml"
name = "ML Intrusion Detection"
version = "1.0.0"
category = "security"
description = "Online learning with Welford stats and nearest-neighbor classification against baseline vectors"
binary = "cog-intrusion-detect-ml-arm"

[config]

[config.interval]
type = "integer"
label = "Scan interval"
description = "Seconds between intrusion checks"
default = 3
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 1", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
