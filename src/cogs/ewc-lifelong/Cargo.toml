[package]
name = "cog-ewc-lifelong"
version = "1.0.0"
edition = "2021"
description = "Elastic Weight Consolidation — prevent catastrophic forgetting of learned baselines"

[[bin]]
name = "cog-ewc-lifelong"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
