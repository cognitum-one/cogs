[package]
name = "cog-predictive-maintenance"
version = "1.0.0"
edition = "2021"
description = "Predictive maintenance — vibration harmonic analysis for rotating machinery (pumps, motors, fans)"

[[bin]]
name = "cog-predictive-maintenance"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
