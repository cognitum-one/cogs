[cog]
id = "predictive-maintenance"
name = "Predictive Maintenance"
version = "1.0.0"
category = "building"
description = "Vibration harmonic analyzer for rotating equipment. Tracks F1 / 2×F1 / high-order / sideband energy to score degradation severity."
binary = "cog-predictive-maintenance-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
default = 1
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[config.baseline_mins]
type = "integer"
label = "Baseline learn period"
default = 5
min = 1
max = 60
unit = "minutes"
cli_arg = "--baseline-mins"

[config.severity_warn]
type = "float"
label = "Severity warn threshold"
default = 0.4
min = 0.1
max = 0.9
step = 0.05
cli_arg = "--severity-warn"

[config.severity_alarm]
type = "float"
label = "Severity alarm threshold"
default = 0.7
min = 0.3
max = 1.0
step = 0.05
cli_arg = "--severity-alarm"

[console]
allowed_commands = ["--once", "--once --interval 1", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
