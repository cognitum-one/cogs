[cog]
id = "network-firewall"
name = "Network Firewall"
version = "1.0.0"
category = "security"
description = "Monitor and block unauthorized outbound network connections per cog"
binary = "cog-network-firewall-arm"

[config]

[config.interval]
type = "integer"
label = "Scan interval"
description = "Seconds between network scans"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
