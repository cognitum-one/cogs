[package]
name = "cog-frost-warning"
version = "1.0.0"
edition = "2021"
description = "Frost warning — temperature trend extrapolation with dewpoint-depression gate"

[[bin]]
name = "cog-frost-warning"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
