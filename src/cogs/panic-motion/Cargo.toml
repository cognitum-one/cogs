[package]
name = "cog-panic-motion"
version = "1.0.0"
edition = "2021"
description = "Panic motion detection — erratic movement via high-frequency energy and jerk analysis"

[[bin]]
name = "cog-panic-motion"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
