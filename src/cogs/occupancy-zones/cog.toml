[cog]
id = "occupancy-zones"
name = "Occupancy Zones"
version = "1.0.0"
category = "building"
description = "Count people per zone using variance-above-threshold presence detection per channel"
binary = "cog-occupancy-zones-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
