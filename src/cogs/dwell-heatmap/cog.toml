[cog]
id = "dwell-heatmap"
name = "Dwell Heatmap"
version = "1.0.0"
category = "retail"
description = "Track dwell time per zone with rolling 1-hour window heatmap and top zones reporting"
binary = "cog-dwell-heatmap-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
