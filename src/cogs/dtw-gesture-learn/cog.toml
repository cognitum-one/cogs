[cog]
id = "dtw-gesture-learn"
name = "DTW Gesture Learn"
version = "1.0.0"
category = "ai"
description = "Dynamic Time Warping gesture recognition — record templates and match new signals with confidence scoring"
binary = "cog-dtw-gesture-learn-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between gesture matching attempts"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
