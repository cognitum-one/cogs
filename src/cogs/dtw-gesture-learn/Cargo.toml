[package]
name = "cog-dtw-gesture-learn"
version = "1.0.0"
edition = "2021"
description = "Dynamic Time Warping gesture recognition — record templates and match new signals"

[[bin]]
name = "cog-dtw-gesture-learn"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
