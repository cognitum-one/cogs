[package]
name = "cog-queue-length"
version = "1.0.0"
edition = "2021"
description = "Estimate queue by counting distinct presence zones in a line, track wait time"

[[bin]]
name = "cog-queue-length"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
