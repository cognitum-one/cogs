[cog]
id = "slip-fall-zone"
name = "Slip / Wet-Floor Zone"
version = "1.0.0"
category = "industrial"
description = "Pre-fall risk detector. Fires when motion-variance drop, splash audio, and optional cautious-gait CSI all signal elevated slip risk."
binary = "cog-slip-fall-zone-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
default = 1
min = 1
max = 10
unit = "seconds"
cli_arg = "--interval"

[config.motion_drop_z]
type = "float"
label = "Motion drop z-score"
default = 1.5
min = 0.5
max = 5.0
step = 0.25
cli_arg = "--motion-drop-z"

[config.splash_z]
type = "float"
label = "Splash z-score"
default = 3.0
min = 1.5
max = 6.0
step = 0.25
cli_arg = "--splash-z"

[config.cooldown]
type = "integer"
label = "Cooldown after fire"
default = 600
min = 60
max = 3600
unit = "seconds"
cli_arg = "--cooldown"

[config.ruview_mode]
type = "boolean"
label = "RuView mode"
description = "Add cautious-gait CSI score to risk fusion"
default = false
cli_arg = "--ruview-mode"

[console]
allowed_commands = ["--once", "--once --interval 1", "--once --ruview-mode", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
