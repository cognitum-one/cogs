[package]
name = "cog-gesture"
version = "1.0.0"
edition = "2021"
description = "Core gesture recognition — template-based DTW matching building block"

[[bin]]
name = "cog-gesture"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
