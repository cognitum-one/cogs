[cog]
id = "swarm-load-balancer"
name = "Swarm Load Balancer"
version = "1.0.0"
category = "swarm"
description = "Distribute queries across seeds based on load metrics so no single one overloads"
binary = "cog-swarm-load-balancer-arm"

[config]

[config.interval]
type = "integer"
label = "Balance interval"
description = "Seconds between load balancing cycles"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.peers]
type = "string"
label = "Peer addresses"
description = "Comma-separated IP addresses of peer seeds in the load pool"
default = ""
cli_arg = "--peers"

[console]
allowed_commands = ["--once --peers 169.254.42.2,169.254.42.3", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
