[package]
name = "cog-swarm-load-balancer"
version = "1.2.0"
edition = "2021"
description = "Distribute queries across seeds based on load metrics"

[[bin]]
name = "cog-swarm-load-balancer"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
