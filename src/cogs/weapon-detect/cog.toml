[cog]
id = "weapon-detect"
name = "Weapon Detection"
version = "1.0.0"
category = "security"
description = "Detect concealed metal objects on a person via signal absorption pattern analysis"
binary = "cog-weapon-detect-arm"

[config]

[config.interval]
type = "integer"
label = "Scan interval"
description = "Seconds between detection scans"
default = 1
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 1", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
