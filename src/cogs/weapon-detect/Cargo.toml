[package]
name = "cog-weapon-detect"
version = "1.0.0"
edition = "2021"
description = "Concealed metal object detection via signal absorption pattern analysis"

[[bin]]
name = "cog-weapon-detect"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
