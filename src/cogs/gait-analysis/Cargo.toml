[package]
name = "cog-gait-analysis"
version = "1.0.0"
edition = "2021"
description = "Gait analysis — cadence, symmetry, regularity, fall risk via autocorrelation"

[[bin]]
name = "cog-gait-analysis"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
