[cog]
id = "package-detect"
name = "Package Arrival Detection"
version = "1.0.0"
category = "retail"
description = "Sustained CSI-shift detector for porch / loading bay package arrivals and departures. Requires ESP32 CSI ruview input."
binary = "cog-package-detect-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
default = 2
min = 1
max = 30
unit = "seconds"
cli_arg = "--interval"

[config.persistence]
type = "integer"
label = "Persistence threshold"
description = "Seconds the shift must persist to count as package arrival"
default = 30
min = 5
max = 600
unit = "seconds"
cli_arg = "--persistence"

[config.shift_z]
type = "float"
label = "Shift z-score"
description = "Z-score of CSI variance shift to enter transient state"
default = 2.5
min = 1.0
max = 5.0
step = 0.25
cli_arg = "--shift-z"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
