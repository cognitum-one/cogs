[cog]
id = "water-leak"
name = "Water Leak Detection"
version = "1.0.0"
category = "building"
description = "Persistent low-amplitude hiss + periodic drip acoustic detector with multi-minute persistence gate. Two-stage likely → confirmed."
binary = "cog-water-leak-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
default = 2
min = 1
max = 30
unit = "seconds"
cli_arg = "--interval"

[config.hiss_z]
type = "float"
label = "Hiss z-score"
default = 1.5
min = 0.5
max = 4.0
step = 0.25
cli_arg = "--hiss-z"

[config.persistence]
type = "integer"
label = "Persistence threshold"
description = "Seconds the signature must hold to fire LEAK_CONFIRMED"
default = 300
min = 30
max = 3600
unit = "seconds"
cli_arg = "--persistence"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
