[cog]
id = "federated-learning"
name = "Federated Learning"
version = "1.0.0"
category = "ai"
description = "Cross-seed model averaging via federated parameter aggregation weighted by sample count"
binary = "cog-federated-learning-arm"

[config]

[config.interval]
type = "integer"
label = "Sync interval"
description = "Seconds between federation rounds"
default = 30
min = 5
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 60", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
