[cog]
id = "behavioral-profiler"
name = "Behavioral Profiler"
version = "1.0.0"
category = "security"
description = "Online k-means codebook of normal signal patterns with anomaly flagging at >2.5 sigma"
binary = "cog-behavioral-profiler-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
