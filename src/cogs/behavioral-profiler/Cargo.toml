[package]
name = "cog-behavioral-profiler"
version = "1.2.0"
edition = "2021"
description = "Behavioral profiling — online k-means codebook of normal signal patterns with anomaly flagging"

[[bin]]
name = "cog-behavioral-profiler"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
