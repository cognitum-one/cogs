[package]
name = "cog-temporal-logic"
version = "1.0.0"
edition = "2021"
description = "Safety rule enforcement — LTL-like temporal logic monitoring"

[[bin]]
name = "cog-temporal-logic"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
