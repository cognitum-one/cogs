[cog]
id = "temporal-logic"
name = "Temporal Logic Guard"
version = "1.0.0"
category = "ai"
description = "LTL-like temporal logic monitoring to enforce safety rules on live event streams"
binary = "cog-temporal-logic-arm"

[config]

[config.interval]
type = "integer"
label = "Check interval"
description = "Seconds between rule evaluation cycles"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
