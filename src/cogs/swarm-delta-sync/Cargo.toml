[package]
name = "cog-swarm-delta-sync"
version = "1.0.0"
edition = "2021"
description = "Bi-directional vector sync between seeds with epoch tracking"

[[bin]]
name = "cog-swarm-delta-sync"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
