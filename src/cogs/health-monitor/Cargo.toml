[package]
name = "cog-health-monitor"
version = "1.0.0"
edition = "2021"
description = "Combined vital signs dashboard — vitals, presence, apnea in one process"

[[bin]]
name = "cog-health-monitor"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
