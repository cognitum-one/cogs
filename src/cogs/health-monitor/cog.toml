[cog]
id = "health-monitor"
name = "Health Monitor"
version = "1.2.4"
category = "health"
description = "Combined vital signs dashboard with heart rate, breathing, presence, and apnea detection in one process"
binary = "cog-health-monitor-arm"
hardware_requirement = ["pi-zero-2w", "v0-appliance"]
# seed#213: this cog consumes only the ESP32 vitals packet (0xC5110002), not
# the raw-CSI firehose. The agent turns this into a packet-type allowlist in
# the csi-relay routes so the relay stops flooding our receive socket.
csi_packet_types = ["vitals"]

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
