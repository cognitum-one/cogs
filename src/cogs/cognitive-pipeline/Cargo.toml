[package]
name = "cog-cognitive-pipeline"
version = "0.1.0"
edition = "2021"
description = "Cognitive pipeline cog — FastGRNN anomaly gate + SmolLM2 sparse-LLM inference (ADR-094, ADR-095)"
license = "MIT"

[[bin]]
name = "cog-cognitive-pipeline"
path = "src/main.rs"

[dependencies]
# HTTP server (loopback only, agent-proxied per ADR-095)
axum = { version = "0.7", default-features = false, features = ["http1", "json", "tokio"] }
tokio = { version = "1.48", features = ["macros", "rt-multi-thread", "signal", "net"] }
tower = { version = "0.5", default-features = false }
hyper = { version = "1.5", default-features = false, features = ["server", "http1"] }

# Serialization / argv
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.5", features = ["derive"] }

# Auth — verify the per-cog bearer token the agent injects
hmac = "0.12"
sha2 = "0.10"
subtle = "2.5"
hex = "0.4"

# Logging — small footprint on Pi Zero
log = "0.4"
env_logger = { version = "0.11", default-features = false, features = ["humantime"] }

# Sparse attention kernel — Pi Zero 2 W profile (window=64, tile=16, FP16 KV).
# Same dep spec as cognitum-one/seed#133 so the moved sparse_llm.rs +
# sparse_llm_runner.rs compile byte-identical here.
ruvllm_sparse_attention = { git = "https://github.com/ruvnet/RuVector", default-features = false, features = ["fp16"] }

# Used by the moved sparse_llm_loader.rs / sparse_llm_weights.rs (mmap of
# .gguf files; little-endian f32/i8 reads).
memmap2 = "0.9"
byteorder = "1.5"

[profile.release]
opt-level = "s"      # optimize for size — Pi Zero binary budget
lto = true
codegen-units = 1
panic = "abort"
strip = true
