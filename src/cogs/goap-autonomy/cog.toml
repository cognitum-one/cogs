[cog]
id = "goap-autonomy"
name = "GOAP Autonomy"
version = "1.0.0"
category = "ai"
description = "Goal-Oriented Action Planning for autonomous action sequence planning and execution"
binary = "cog-goap-autonomy-arm"

[config]

[config.interval]
type = "integer"
label = "Planning interval"
description = "Seconds between planning cycles"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
