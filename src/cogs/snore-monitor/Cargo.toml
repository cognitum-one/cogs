[package]
name = "cog-snore-monitor"
version = "1.0.0"
edition = "2021"
description = "Snore monitor — periodic low-band energy tracker with snores-per-minute output"

[[bin]]
name = "cog-snore-monitor"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
