[cog]
id = "intrusion"
name = "Intrusion Detection"
version = "1.0.0"
category = "security"
description = "Baseline learning + combined z-score alerting for unauthorized presence"
binary = "cog-intrusion-arm"

[config]

[config.interval]
type = "integer"
label = "Scan interval"
default = 3
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[config.arm_after]
type = "integer"
label = "Arm after"
description = "Seconds of baseline learning before arming the detector"
default = 60
min = 10
max = 600
unit = "seconds"
cli_arg = "--arm-after"

[config.detection_threshold]
type = "float"
label = "Detection threshold"
description = "Combined z-score threshold to trigger intrusion alert"
default = 3.0
min = 1.5
max = 6.0
step = 0.5
cli_arg = "--detection-threshold"

[config.trigger_count]
type = "integer"
label = "Consecutive triggers"
description = "Number of consecutive detections before alarm"
default = 2
min = 1
max = 10
cli_arg = "--trigger-count"

[console]
allowed_commands = ["--once", "--once --arm-after 5"]
max_runtime_secs = 15
output_limit_bytes = 65536
