[package]
name = "cog-intrusion"
version = "1.0.0"
edition = "2021"
description = "Intrusion detection — unauthorized presence alerting with zone tracking"

[[bin]]
name = "cog-intrusion"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
