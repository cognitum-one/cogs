[package]
name = "cog-confined-space"
version = "1.0.0"
edition = "2021"
description = "Monitor workers in confined spaces — presence duration, breathing, inactivity alerts"

[[bin]]
name = "cog-confined-space"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
