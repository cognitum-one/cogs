[cog]
id = "cardiac-arrhythmia"
name = "Cardiac Arrhythmia"
version = "1.2.1"
category = "health"
description = "HRV analysis using RMSSD and pNN50 from bandpass-filtered heart rate signal for arrhythmia detection"
binary = "cog-cardiac-arrhythmia-arm"
hardware_requirement = ["pi-zero-2w", "v0-appliance"]

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 3", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
