[package]
name = "cog-cardiac-arrhythmia"
version = "1.0.0"
edition = "2021"
description = "Cardiac arrhythmia detection — HRV analysis using RMSSD and pNN50"

[[bin]]
name = "cog-cardiac-arrhythmia"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
