[cog]
id = "perimeter-breach"
name = "Perimeter Breach"
version = "1.0.0"
category = "security"
description = "Multi-zone perimeter monitoring with entry direction detection via zone trigger sequence"
binary = "cog-perimeter-breach-arm"

[config]

[config.interval]
type = "integer"
label = "Scan interval"
description = "Seconds between perimeter scans"
default = 2
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[config.threshold]
type = "float"
label = "Detection threshold"
description = "Z-score threshold to trigger zone breach detection"
default = 3.0
min = 1.0
max = 10.0
step = 0.5
cli_arg = "--threshold"

[console]
allowed_commands = ["--once", "--once --threshold 2.0", "--once --threshold 5.0", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
