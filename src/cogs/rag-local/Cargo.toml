[package]
name = "cog-rag-local"
version = "1.0.0"
edition = "2021"
description = "Local retrieval-augmented generation — trigram embedding similarity search"

[[bin]]
name = "cog-rag-local"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
