[cog]
id = "happiness-score"
name = "Happiness Score"
version = "1.0.0"
category = "research"
description = "Composite well-being score from movement, breathing regularity, and activity on a 0-100 scale"
binary = "cog-happiness-score-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
