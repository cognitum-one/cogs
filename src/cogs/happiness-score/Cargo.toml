[package]
name = "cog-happiness-score"
version = "1.2.0"
edition = "2021"
description = "Happiness score — composite well-being from movement, breathing regularity, activity"

[[bin]]
name = "cog-happiness-score"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
