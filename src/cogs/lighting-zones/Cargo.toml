[package]
name = "cog-lighting-zones"
version = "1.0.0"
edition = "2021"
description = "Movement-based zone lighting control with auto-off timeout"

[[bin]]
name = "cog-lighting-zones"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
