[package]
name = "cog-table-turnover"
version = "1.2.0"
edition = "2021"
description = "Track table occupancy cycles — sit-down, meal duration, departure, turnover rate"

[[bin]]
name = "cog-table-turnover"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
