[package]
name = "cog-self-healing-mesh"
version = "1.0.0"
edition = "2021"
description = "Sensor mesh health monitor — dropped node detection and redistribution"

[[bin]]
name = "cog-self-healing-mesh"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
