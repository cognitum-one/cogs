[cog]
id = "self-healing-mesh"
name = "Self-Healing Mesh"
version = "1.0.0"
category = "developer"
description = "Sensor mesh health monitor with dropped node detection and automatic redistribution"
binary = "cog-self-healing-mesh-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between mesh health checks"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
