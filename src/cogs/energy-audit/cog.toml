[cog]
id = "energy-audit"
name = "Energy Audit"
version = "1.0.0"
category = "building"
description = "Learn daily usage patterns with hourly Welford statistics, detect wasted energy and report savings estimates"
binary = "cog-energy-audit-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 60
min = 10
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 30", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
