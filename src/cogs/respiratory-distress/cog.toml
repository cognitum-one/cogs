[cog]
id = "respiratory-distress"
name = "Respiratory Distress"
version = "1.0.0"
category = "health"
description = "Breathing rate, effort, and Cheyne-Stokes pattern detection for respiratory distress monitoring"
binary = "cog-respiratory-distress-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 3", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
