[package]
name = "cog-coherence"
version = "1.0.0"
edition = "2021"
description = "Signal quality monitor — per-channel coherence metrics and noise floor"

[[bin]]
name = "cog-coherence"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
