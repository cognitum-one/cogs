[cog]
id = "clean-room"
name = "Clean Room"
version = "1.0.0"
category = "industrial"
description = "Enforce maximum headcount in controlled environments via simultaneous presence counting"
binary = "cog-clean-room-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 3
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.max_occupancy]
type = "integer"
label = "Maximum occupancy"
description = "Maximum allowed number of people before alert triggers"
default = 4
min = 1
max = 50
cli_arg = "--max-occupancy"

[console]
allowed_commands = ["--once", "--once --max-occupancy 4", "--once --max-occupancy 6", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
