[package]
name = "cog-swarm-mqtt-bridge"
version = "1.0.0"
edition = "2021"
description = "Lightweight TCP-based pub/sub event sharing between seeds"

[[bin]]
name = "cog-swarm-mqtt-bridge"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
