[package]
name = "cog-plant-growth"
version = "1.0.0"
edition = "2021"
description = "Plant growth tracker — daily growth rate, day/night cycles, rolling 24h stats"

[[bin]]
name = "cog-plant-growth"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
