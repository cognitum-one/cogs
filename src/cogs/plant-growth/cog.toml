[cog]
id = "plant-growth"
name = "Plant Growth"
version = "1.0.0"
category = "research"
description = "Track plant growth rate, day/night cycles, and rolling 24-hour statistics"
binary = "cog-plant-growth-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 300
min = 30
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 60", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
