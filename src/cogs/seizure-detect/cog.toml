[cog]
id = "seizure-detect"
name = "Seizure Detection"
version = "1.0.0"
category = "health"
description = "Detect seizures via high-frequency burst energy ratio and post-ictal suppression analysis"
binary = "cog-seizure-detect-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 3
min = 1
max = 60
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 1", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
