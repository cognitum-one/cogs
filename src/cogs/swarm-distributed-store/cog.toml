[cog]
id = "swarm-distributed-store"
name = "Distributed Vector Store"
version = "1.0.0"
category = "swarm"
description = "Distribute vectors across seeds with hash partitioning and fan-out query"
binary = "cog-swarm-distributed-store-arm"

[config]

[config.interval]
type = "integer"
label = "Sync interval"
description = "Seconds between distribution cycles"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.peers]
type = "string"
label = "Peer addresses"
description = "Comma-separated IP addresses of peer seeds in the distributed store"
default = ""
cli_arg = "--peers"

[console]
allowed_commands = ["--once --peers 169.254.42.2,169.254.42.3", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
