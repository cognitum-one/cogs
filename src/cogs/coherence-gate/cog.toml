[cog]
id = "coherence-gate"
name = "Coherence Gate"
version = "1.0.0"
category = "signal"
description = "Filter signals by channel-pair coherence, only passing clean data above threshold with SNR estimation"
binary = "cog-coherence-gate-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.threshold]
type = "float"
label = "Coherence threshold"
description = "Minimum coherence level to pass signals through the gate"
default = 0.7
min = 0.1
max = 1.0
step = 0.05
cli_arg = "--threshold"

[console]
allowed_commands = ["--once", "--once --threshold 0.5", "--once --threshold 0.9", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
