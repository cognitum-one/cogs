[package]
name = "cog-vital-trend"
version = "1.0.0"
edition = "2021"
description = "Vital signs trend monitoring — breathing and heart rate extraction"

[[bin]]
name = "cog-vital-trend"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
