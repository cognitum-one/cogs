[package]
name = "cog-interference-search"
version = "1.0.0"
edition = "2021"
description = "Grover-inspired search — amplitude amplification anomaly detection"

[[bin]]
name = "cog-interference-search"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
