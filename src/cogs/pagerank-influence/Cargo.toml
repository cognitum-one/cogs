[package]
name = "cog-pagerank-influence"
version = "1.0.0"
edition = "2021"
description = "Graph-based influence detection — channel correlation PageRank"

[[bin]]
name = "cog-pagerank-influence"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
