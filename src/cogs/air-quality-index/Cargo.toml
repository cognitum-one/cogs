[package]
name = "cog-air-quality-index"
version = "1.2.0"
edition = "2021"
description = "Air quality index — AQI from PM2.5/CO2 proxy using EPA breakpoints"

[[bin]]
name = "cog-air-quality-index"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
