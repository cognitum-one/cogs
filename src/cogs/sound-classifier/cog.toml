[cog]
id = "sound-classifier"
name = "Sound Classifier"
version = "1.0.0"
category = "research"
description = "Classify sounds like glass break, alarm, or baby cry from signal modulation patterns"
binary = "cog-sound-classifier-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between classifications"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
