[cog]
id = "glass-break"
name = "Glass-Break Detection"
version = "1.0.0"
category = "security"
description = "Two-phase bang + shatter acoustic detector. Distinguishes glass break from ordinary impulse noise."
binary = "cog-glass-break-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
default = 1
min = 1
max = 5
unit = "seconds"
cli_arg = "--interval"

[config.bang_z]
type = "float"
label = "Bang z-score"
default = 5.0
min = 2.0
max = 10.0
step = 0.5
cli_arg = "--bang-z"

[config.shatter_window_ms]
type = "integer"
label = "Shatter window"
description = "Milliseconds after bang within which shatter must be observed"
default = 500
min = 100
max = 2000
unit = "ms"
cli_arg = "--shatter-window-ms"

[config.cooldown]
type = "integer"
label = "Cooldown after fire"
default = 30
min = 5
max = 600
unit = "seconds"
cli_arg = "--cooldown"

[console]
allowed_commands = ["--once", "--once --interval 1", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
