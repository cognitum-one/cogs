[package]
name = "cog-structural-vibration"
version = "1.0.0"
edition = "2021"
description = "Detect dangerous vibrations via high-pass filter and RMS energy analysis"

[[bin]]
name = "cog-structural-vibration"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
