[cog]
id = "micro-hnsw"
name = "Micro HNSW"
version = "1.0.0"
category = "ai"
description = "Hierarchical Navigable Small World graph for fast on-device fingerprint matching and classification"
binary = "cog-micro-hnsw-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
