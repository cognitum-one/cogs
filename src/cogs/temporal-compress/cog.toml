[cog]
id = "temporal-compress"
name = "Temporal Compress"
version = "1.0.0"
category = "signal"
description = "Downsample old data to save memory while keeping recent data at full resolution"
binary = "cog-temporal-compress-arm"

[config]

[config.interval]
type = "integer"
label = "Compression interval"
description = "Seconds between compression cycles"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 30", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
