[package]
name = "cog-temporal-compress"
version = "1.2.0"
edition = "2021"
description = "Temporal compression — downsample old data, keep recent at full resolution"

[[bin]]
name = "cog-temporal-compress"
path = "src/main.rs"

[dependencies]
cog-sensor-sources = { path = "../../../crates/cog-sensor-sources" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
