[cog]
id = "dream-stage"
name = "Dream Stage"
version = "1.0.0"
category = "health"
description = "Sleep stage classification (deep, REM, light, wake) from movement and breathing patterns"
binary = "cog-dream-stage-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between sleep stage evaluations"
default = 60
min = 10
max = 600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 30", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
