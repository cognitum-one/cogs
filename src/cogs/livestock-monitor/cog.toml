[cog]
id = "livestock-monitor"
name = "Livestock Monitor"
version = "1.0.0"
category = "industrial"
description = "Detect animal activity patterns, distress signals, and escape events via CSI analysis"
binary = "cog-livestock-monitor-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
