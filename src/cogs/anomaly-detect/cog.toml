[cog]
id = "anomaly-detect"
name = "Anomaly Detection"
version = "1.0.0"
category = "health"
description = "Welford online statistics + CUSUM drift detection on sensor streams"
binary = "cog-anomaly-detect-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.threshold]
type = "float"
label = "Z-score threshold"
description = "Standard deviations from mean to trigger anomaly alert"
default = 2.5
min = 1.0
max = 5.0
step = 0.1
cli_arg = "--threshold"

[config.cusum_threshold]
type = "float"
label = "CUSUM drift threshold"
description = "Cumulative sum threshold for gradual drift detection"
default = 5.0
min = 1.0
max = 20.0
cli_arg = "--cusum-threshold"
advanced = true

[config.cusum_drift]
type = "float"
label = "CUSUM drift allowance"
description = "Expected normal drift per sample"
default = 0.5
min = 0.1
max = 2.0
cli_arg = "--cusum-drift"
advanced = true

[console]
allowed_commands = ["--once", "--once --threshold 1.5", "--once --threshold 3.0"]
max_runtime_secs = 15
output_limit_bytes = 65536
