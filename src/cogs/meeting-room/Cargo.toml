[package]
name = "cog-meeting-room"
version = "1.0.0"
edition = "2021"
description = "Binary occupied/free status with confidence, duration, and utilization tracking"

[[bin]]
name = "cog-meeting-room"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
