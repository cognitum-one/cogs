[package]
name = "cog-swarm-witness-federation"
version = "1.0.0"
edition = "2021"
description = "Share and cross-attest witness chain entries between seeds for tamper detection"

[[bin]]
name = "cog-swarm-witness-federation"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
