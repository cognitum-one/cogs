[cog]
id = "elevator-count"
name = "Elevator Count"
version = "1.0.0"
category = "building"
description = "Count people by signal disruption intensity with online linear regression calibration"
binary = "cog-elevator-count-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 3", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
