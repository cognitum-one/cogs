[cog]
id = "gesture-language"
name = "Gesture Language"
version = "1.0.0"
category = "research"
description = "Recognize predefined gesture patterns using Dynamic Time Warping against stored templates"
binary = "cog-gesture-language-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between gesture matching attempts"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 5", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
