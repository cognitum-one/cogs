[cog]
id = "swarm-cluster-monitor"
name = "Cluster Health Monitor"
version = "1.0.0"
category = "swarm"
description = "Poll peer seeds for health status and aggregate cluster-wide metrics"
binary = "cog-swarm-cluster-monitor-arm"

[config]

[config.interval]
type = "integer"
label = "Poll interval"
description = "Seconds between health polls"
default = 15
min = 5
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.peers]
type = "string"
label = "Peer addresses"
description = "Comma-separated IP addresses of peer seeds to monitor"
default = ""
cli_arg = "--peers"

[console]
allowed_commands = ["--once --peers 169.254.42.2,169.254.42.3", "--once --peers 169.254.42.2", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
