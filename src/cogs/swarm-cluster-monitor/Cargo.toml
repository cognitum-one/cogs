[package]
name = "cog-swarm-cluster-monitor"
version = "1.0.0"
edition = "2021"
description = "Poll peer seeds for health, aggregate cluster-wide metrics"

[[bin]]
name = "cog-swarm-cluster-monitor"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
