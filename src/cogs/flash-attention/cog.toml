[cog]
id = "flash-attention"
name = "Flash Attention"
version = "1.0.0"
category = "signal"
description = "Adaptive sensing that focuses processing on highest-information channels by variance and entropy ranking"
binary = "cog-flash-attention-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 10
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[config.top_k]
type = "integer"
label = "Top-K channels"
description = "Number of highest-importance channels to focus on"
default = 4
min = 1
max = 16
cli_arg = "--top-k"

[console]
allowed_commands = ["--once", "--once --top-k 2", "--once --top-k 8", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
