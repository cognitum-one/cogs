[package]
name = "cog-emotion-detect"
version = "1.0.0"
edition = "2021"
description = "Emotion detection — arousal/valence from body movement via Russell circumplex model"

[[bin]]
name = "cog-emotion-detect"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
