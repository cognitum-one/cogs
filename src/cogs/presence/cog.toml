[cog]
id = "presence"
name = "Presence Detection"
version = "1.0.0"
category = "building"
description = "Presence detection via z-score on CSI RSSI with debounce filtering"
binary = "cog-presence-arm"

[config]

[config.interval]
type = "integer"
label = "Sampling interval"
description = "Seconds between measurements"
default = 5
min = 1
max = 3600
unit = "seconds"
cli_arg = "--interval"

[console]
allowed_commands = ["--once", "--once --interval 3", "--help"]
max_runtime_secs = 15
output_limit_bytes = 65536
