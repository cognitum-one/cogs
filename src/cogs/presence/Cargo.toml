[package]
name = "cog-presence"
version = "1.0.0"
edition = "2021"
description = "Presence detection — z-score on CSI RSSI with debounce"

[[bin]]
name = "cog-presence"
path = "src/main.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
strip = true
