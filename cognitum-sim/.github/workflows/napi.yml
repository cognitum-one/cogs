name: NAPI Build and Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'newport-napi/**'
      - '.github/workflows/napi.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'newport-napi/**'
      - '.github/workflows/napi.yml'

env:
  DEBUG: napi:*
  APP_NAME: newport
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: |
              yarn build --target x86_64-unknown-linux-gnu
              strip *.node

          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |
              set -e &&
              yarn build --target x86_64-unknown-linux-musl &&
              strip *.node

          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: |
              set -e &&
              yarn build --target aarch64-unknown-linux-gnu &&
              aarch64-linux-gnu-strip *.node

          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: |
              set -e &&
              yarn build --target aarch64-unknown-linux-musl &&
              aarch64-linux-musl-strip *.node

          - host: macos-latest
            target: x86_64-apple-darwin
            build: |
              yarn build --target x86_64-apple-darwin
              strip -x *.node

          - host: macos-latest
            target: aarch64-apple-darwin
            build: |
              yarn build --target aarch64-apple-darwin
              strip -x *.node

          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: yarn build --target x86_64-pc-windows-msvc

          - host: windows-latest
            target: aarch64-pc-windows-msvc
            build: yarn build --target aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: newport-sim/newport-napi/yarn.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.settings.docker }}
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.settings.docker }}
        with:
          workspaces: newport-sim/newport-napi
          key: ${{ matrix.settings.target }}

      - name: Setup Docker (Linux)
        if: ${{ matrix.settings.docker }}
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        working-directory: newport-sim/newport-napi
        run: yarn install

      - name: Build in Docker
        if: ${{ matrix.settings.docker }}
        working-directory: newport-sim/newport-napi
        run: |
          docker run --rm -v $(pwd):/build -w /build ${{ matrix.settings.docker }} sh -c "${{ matrix.settings.build }}"

      - name: Build
        if: ${{ !matrix.settings.docker }}
        working-directory: newport-sim/newport-napi
        run: ${{ matrix.settings.build }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: newport-sim/newport-napi/*.node
          if-no-files-found: error

  test:
    name: Test ${{ matrix.settings.target }}
    needs: build
    runs-on: ${{ matrix.settings.host }}

    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: newport-sim/newport-napi/yarn.lock

      - name: Install dependencies
        working-directory: newport-sim/newport-napi
        run: yarn install

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: newport-sim/newport-napi

      - name: Run tests
        working-directory: newport-sim/newport-napi
        run: yarn test

  universal-macOS:
    name: Build universal macOS binary
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: newport-sim/newport-napi/yarn.lock

      - name: Install dependencies
        working-directory: newport-sim/newport-napi
        run: yarn install

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-apple-darwin
          path: artifacts/x64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-apple-darwin
          path: artifacts/arm64

      - name: Create universal binary
        working-directory: newport-sim/newport-napi
        run: yarn napi universalize

      - name: Upload universal binary
        uses: actions/upload-artifact@v4
        with:
          name: bindings-universal-apple-darwin
          path: newport-sim/newport-napi/*.node

  publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, universal-macOS]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: newport-sim/newport-napi
        run: yarn install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts
        working-directory: newport-sim/newport-napi
        run: yarn napi artifacts

      - name: Publish to npm
        working-directory: newport-sim/newport-napi
        run: |
          npm config set provenance true
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  lint:
    name: Lint NAPI code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: newport-sim/newport-napi/yarn.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        working-directory: newport-sim/newport-napi
        run: yarn install

      - name: Run rustfmt
        working-directory: newport-sim/newport-napi
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: newport-sim/newport-napi
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run oxlint
        working-directory: newport-sim/newport-napi
        run: yarn lint
