# Newport ASIC Simulator Configuration
# This is an example configuration file showing all available options

[simulation]
# Use event-driven simulation for better performance
event_driven = true

# Enable cycle-accurate mode for precise timing (slower)
cycle_accurate = false

# Maximum number of cycles before timeout (null for unlimited)
max_cycles = 10_000_000

# Performance mode - disables some runtime checks
performance_mode = true

# Random seed for deterministic execution (null for non-deterministic)
random_seed = 42

[hardware]
# Number of tiles to simulate (1-256)
tiles = 256

# Clock frequency in MHz
clock_freq_mhz = 1000

# Memory sizes in KB
code_memory_kb = 8
data_memory_kb = 8
work_memory_kb = 64

# Enable ECC memory protection
ecc_enabled = true

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Trace options
trace_packets = false
trace_instructions = false
trace_memory = false

# Output file for trace (null for stdout)
trace_file = "newport_trace.log"

[performance]
# Number of worker threads for parallel execution
worker_threads = 8

# Enable performance metrics collection
metrics_enabled = true

# RaceWay packet timeout in milliseconds
packet_timeout_ms = 100

# Enable parallel tile execution
parallel_execution = true
