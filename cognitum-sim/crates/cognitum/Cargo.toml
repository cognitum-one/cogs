[package]
name = "cognitum"
version = "0.1.0"
edition = "2021"
authors = ["Cognitum Team"]
description = "High-level SDK for Cognitum ASIC Simulator"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ruvnet/cognitum"
keywords = ["simulation", "asic", "forth", "parallel", "sdk"]
categories = ["simulation", "development-tools"]

[dependencies]
# Core Cognitum modules
cognitum-core = { path = "../cognitum-core", version = "0.1.0" }
cognitum-processor = { path = "../cognitum-processor", version = "0.1.0" }
cognitum-memory = { path = "../cognitum-memory", version = "0.1.0" }
cognitum-raceway = { path = "../cognitum-raceway", version = "0.1.0" }
cognitum-sim = { path = "../cognitum-sim", version = "0.1.0" }
cognitum-coprocessor = { path = "../cognitum-coprocessor", version = "0.1.0", optional = true }
cognitum-io = { path = "../cognitum-io", version = "0.1.0", optional = true }
cognitum-debug = { path = "../cognitum-debug", version = "0.1.0", optional = true }

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"], optional = true }

# Logging
tracing = "0.1"

# Mocking (used in traits for testing)
mockall = "0.12"

[dev-dependencies]
tokio-test = "0.4"
tracing-subscriber = "0.3"

[features]
default = ["std"]
std = []
coprocessor = ["cognitum-coprocessor"]
io = ["cognitum-io"]
debug = ["cognitum-debug"]
serde = ["dep:serde"]
full = ["coprocessor", "io", "debug", "serde"]
