[package]
name = "agentvm-scheduler"
version = "0.1.0"
edition = "2021"
description = "Heterogeneous fabric scheduler for Agentic VM runtime (ADR-007)"
license = "Apache-2.0"
repository = "https://github.com/ruvnet/cognitum"
keywords = ["scheduler", "fabric", "agent", "heterogeneous", "runtime"]
categories = ["asynchronous", "concurrency"]

[lib]
crate-type = ["rlib"]

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["sync", "time", "rt", "macros"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Unique identifiers
uuid = { version = "1.7", features = ["v4", "v7", "serde"] }

# Error handling
thiserror = "1.0"

# Logging and tracing
tracing = "0.1"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1.35", features = ["full", "test-util"] }
proptest = "1.4"
criterion = "0.5"

[features]
default = []
metrics-export = []
tracing-spans = ["tracing/attributes"]

