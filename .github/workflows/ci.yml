name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changed-cogs:
    name: Detect changed cogs
    runs-on: ubuntu-latest
    outputs:
      cogs: ${{ steps.detect.outputs.cogs }}
      shared: ${{ steps.detect.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which cogs changed
        id: detect
        shell: bash
        run: |
          set -eo pipefail
          # Compare against PR base or last commit on push.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          CHANGED_FILES=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES" | sed 's/^/  /'

          # Cogs that changed
          COGS=$(echo "$CHANGED_FILES" | awk -F/ '/^src\/cogs\// { print $3 }' | sort -u | tr '\n' ' ')

          # Shared crates that changed → forces all-cogs check.
          # `|| true` because `set -eo pipefail` + grep-no-match would abort the
          # step on any PR that doesn't touch the shared crates (the common case).
          SHARED=$(echo "$CHANGED_FILES" | grep -E '^(crates/cog-sensor-sources|Cargo\.toml|Cargo\.lock)' | head -c 1 || true)

          if [ -n "$SHARED" ]; then
            COGS=$(ls -d src/cogs/*/ | xargs -n1 basename | tr '\n' ' ')
            echo "Shared crate or root Cargo changed → checking ALL cogs"
          fi

          # JSON-array for matrix
          if [ -z "$COGS" ]; then
            COGS_JSON='[]'
          else
            COGS_JSON=$(echo "$COGS" | tr ' ' '\n' | grep -v '^$' | jq -Rs 'split("\n") | map(select(length > 0))' -c)
          fi

          echo "cogs=$COGS_JSON" >> "$GITHUB_OUTPUT"
          echo "shared=${SHARED:+yes}" >> "$GITHUB_OUTPUT"
          echo "Will check: $COGS_JSON"

  check:
    name: cargo check ${{ matrix.cog }}
    needs: changed-cogs
    if: needs.changed-cogs.outputs.cogs != '[]' && needs.changed-cogs.outputs.cogs != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        cog: ${{ fromJSON(needs.changed-cogs.outputs.cogs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/cogs/${{ matrix.cog }}/target
          key: cogs-check-${{ matrix.cog }}-${{ hashFiles('src/cogs/${{ matrix.cog }}/Cargo.toml', 'crates/cog-sensor-sources/Cargo.toml') }}
          restore-keys: |
            cogs-check-${{ matrix.cog }}-

      - name: cargo check
        working-directory: src/cogs/${{ matrix.cog }}
        run: cargo check --release --all-targets

      - name: cargo test
        working-directory: src/cogs/${{ matrix.cog }}
        run: cargo test --release --all-targets

  shared-crates:
    name: cargo check shared crates
    needs: changed-cogs
    if: needs.changed-cogs.outputs.shared == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (cog-sensor-sources)
        working-directory: crates/cog-sensor-sources
        run: cargo check --release --all-targets
      - name: cargo test (cog-sensor-sources)
        working-directory: crates/cog-sensor-sources
        run: cargo test --release --all-targets

  manifest-validate:
    name: Validate cog.toml + Cargo.toml consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every cog has cog.toml + Cargo.toml + src/main.rs
        shell: bash
        run: |
          set -eo pipefail
          fail=0
          for d in src/cogs/*/; do
            cog=$(basename "$d")
            for required in cog.toml Cargo.toml src/main.rs; do
              if [ ! -f "$d/$required" ]; then
                echo "::error file=$d::missing $required"
                fail=$((fail+1))
              fi
            done
            # Check id in cog.toml matches dir name
            if [ -f "$d/cog.toml" ]; then
              id=$(grep '^id = ' "$d/cog.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
              if [ -n "$id" ] && [ "$id" != "$cog" ]; then
                echo "::error file=$d/cog.toml::id ($id) does not match directory ($cog)"
                fail=$((fail+1))
              fi
            fi
            # Check binary name in Cargo.toml matches cog-<dir>
            if [ -f "$d/Cargo.toml" ]; then
              expected="cog-$cog"
              actual=$(grep -A2 '^\[\[bin\]\]' "$d/Cargo.toml" | grep '^name = ' | head -1 | sed 's/.*"\(.*\)".*/\1/')
              if [ "$actual" != "$expected" ]; then
                echo "::error file=$d/Cargo.toml::bin name ($actual) does not match expected ($expected)"
                fail=$((fail+1))
              fi
            fi
          done
          if [ $fail -gt 0 ]; then
            echo "::error::$fail manifest issues found"
            exit 1
          fi
          echo "::notice::all $(ls -d src/cogs/*/ | wc -l) cogs have valid manifests"

      - name: Validate hardware_requirement (device → build-arch gating)
        shell: bash
        run: |
          set -eo pipefail
          # hardware_requirement drives which arch(es) the publish lane builds
          # (scripts/cog-targets.py). Require it present and made only of known
          # devices so a typo can't silently drop a cog from a fleet's catalog.
          python3 - <<'PY'
          import sys, tomllib, pathlib
          KNOWN = {"pi-zero-2w", "v0-appliance"}
          fail = 0
          for t in sorted(pathlib.Path("src/cogs").glob("*/cog.toml")):
              cog = t.parent.name
              data = tomllib.load(t.open("rb")).get("cog", {})
              hw = data.get("hardware_requirement")
              if hw is None:
                  print(f"::error file={t}::cog '{cog}' missing hardware_requirement")
                  fail += 1; continue
              if isinstance(hw, str):
                  hw = [hw]
              if not isinstance(hw, list) or not hw:
                  print(f"::error file={t}::cog '{cog}' hardware_requirement must be a non-empty list/string")
                  fail += 1; continue
              bad = [d for d in hw if d not in KNOWN]
              if bad:
                  print(f"::error file={t}::cog '{cog}' unknown device(s) {bad}; allowed: {sorted(KNOWN)}")
                  fail += 1
          if fail:
              print(f"::error::{fail} hardware_requirement issue(s)"); sys.exit(1)
          print("::notice::all cogs declare a valid hardware_requirement")
          PY

  adr-required:
    name: Require ADR for new cog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check new cog has docs/adrs/ADR-*.md
        shell: bash
        run: |
          set -eo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          NEW_COGS=$(git diff --name-only --diff-filter=A "$BASE" HEAD \
            | awk -F/ '/^src\/cogs\/[^/]+\/cog\.toml$/ { print $3 }' | sort -u)
          if [ -z "$NEW_COGS" ]; then
            echo "::notice::no new cogs in this PR"
            exit 0
          fi
          fail=0
          for cog in $NEW_COGS; do
            # Look for any ADR mentioning the cog id
            if ! ls docs/adrs/ADR-*${cog}*.md 2>/dev/null | head -1 | grep -q .; then
              echo "::error::new cog '$cog' is missing an ADR in docs/adrs/"
              fail=$((fail+1))
            fi
          done
          if [ $fail -gt 0 ]; then exit 1; fi
          echo "::notice::all new cogs have ADRs"

  asset-sha256-validate:
    name: Asset sha256 must not be TODO (publish gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject TODO sha256 in [[assets]] without a bring-up marker
        shell: bash
        run: |
          set -eo pipefail
          # ADR-095 §4: asset sha256 in cog.toml is what the agent's install
          # handler verifies after the GCS download. Shipping a TODO sha256
          # past publish-time means a corrupted or swapped asset would not be
          # caught. This gate fails if any cog.toml contains `sha256 = "TODO-`
          # UNLESS the cog directory carries an empty `.allow-unpublished-assets`
          # marker — used during a cog's bring-up window before the GCS
          # upload + sha publication has happened. Remove the marker AND fill
          # in the real sha256 in the same PR that publishes the assets.
          violations=0
          for d in src/cogs/*/; do
            cog=$(basename "$d")
            if [ ! -f "$d/cog.toml" ]; then
              continue
            fi
            if [ -f "$d/.allow-unpublished-assets" ]; then
              if grep -E 'sha256 = "TODO-' "$d/cog.toml" >/dev/null 2>&1; then
                echo "::notice file=$d/cog.toml::cog '$cog' carries .allow-unpublished-assets (bring-up window). TODO sha256s grandfathered until that marker is removed."
              fi
              continue
            fi
            if grep -E 'sha256 = "TODO-' "$d/cog.toml" >/dev/null 2>&1; then
              echo "::error file=$d/cog.toml::cog '$cog' has TODO sha256 in [[assets]] but no .allow-unpublished-assets marker. Fill in the real sha256 (and drop the marker, if any) before publishing."
              violations=$((violations+1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations cog(s) have TODO sha256 without a bring-up marker"
            exit 1
          fi
          echo "::notice::all cogs with [[assets]] have real sha256 or a bring-up marker"
