name: QE Auto Investigation
# Auto-files an investigation issue on Project 8 when a CI run fails on the
# default branch. See docs/qe-plans/gh-spec/03-cross-repo-qe-project.md Part E.1
# in the cognitum-one/cognitum meta-repo.

on:
  workflow_run:
    workflows:
      - "CI"
    types: [completed]

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  file-investigation:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == github.event.workflow_run.repository.default_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Create investigation issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL:  ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID:   ${{ github.event.workflow_run.id }}
          SHA:      ${{ github.event.workflow_run.head_sha }}
          REPO:     ${{ github.repository }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          ## Symptom
          \`${RUN_NAME}\` failed on ${SHA:0:7} — ${RUN_URL}

          ## Hypothesis
          (auto-filed — fill in)

          ## Reproduction
          \`\`\`
          gh run view ${RUN_ID} --repo ${REPO} --log-failed
          \`\`\`

          ## Root cause
          _TBD_

          ## Fix
          _TBD_

          ---
          Auto-filed by \`qe-auto-investigation.yml\`.
          EOF
          )
          URL=$(gh issue create \
            --repo "$REPO" \
            --title "[investigation] ${RUN_NAME} failed on ${SHA:0:7}" \
            --label "kind/investigation" \
            --body "$BODY")
          echo "issue_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Add issue to Project 8
        env:
          GH_TOKEN:  ${{ secrets.QE_PROJECT_TOKEN }}
          ISSUE_URL: ${{ steps.issue.outputs.issue_url }}
        run: |
          gh project item-add 8 --owner cognitum-one --url "$ISSUE_URL"
